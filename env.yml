name: pubmed_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - llama-cpp-python
  - python=3.10
  - biopython
  - pandas
  - lxml        # optional, useful for XML parsing
  - pytorch
  - pip
  - pip:
      - xmltodict  # optional, if you prefer dict-based XML parsing
      - langchain
      - langchain-anthropic
      - huggingface_hub
      - transformers
