name: Build and Deploy 11ty Site

on:
  push:
    branches:
      - main  # Trigger on push to main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build Eleventy site
      - name: Build Eleventy
        run: npx @11ty/eleventy --input=site --output=docs --quiet

      # 5. Deploy to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAT_TOKEN2 }}
          publish_dir: ./ # Folder to deploy
          publish_branch: gh-pages  # Deploy to gh-pages branch
          allow_empty_commit: true  # Deploy even if no changes
